$terminal = kitty
$fileManager = thunar
$menu = rofi -show combi -modes "drun,window"
$browser = firefox


env = XCURSOR_SIZE,24
env = XCURSOR_THEME, BreezeX-RosePine

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland # If you use Qt apps
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1 # If you use Qt apps
env = MOZ_ENABLE_WAYLAND,1 # If you use Firefox/Mozilla
